project:
  name: example-typescript-node-app
  description: A TypeScript application on Node.
  kind: brownfield

artifact_root: ai_docs

task:
  id_scheme: "TASK-{NNN}"
  spec_grouping: by-concern

vcs:
  default_base_branch: master
  branch_scheme: "feature/{task-id-lower}-{slug}"

tech_stack:
  language: typescript
  package_manager: pnpm
  runtime_version: "20"
  test_runner: vitest
  linter: eslint

test_gate:
  commands:
    - "pnpm test"
  conventions_doc: reference/testing-conventions.md
  test_naming: "describe/it behaviour names"

deploy_config:
  detected: false
  config_files: []

reference:
  context_doc: reference/CONTEXT.md
  adr_dir: reference/adr

review:
  mode: light
  roster:
    - spec-conformance
    - correctness
    - security-and-trust-boundary
    - test-adequacy
    - conventions
  consolidator: review-consolidator
  severity_model: "irreversibility x silence x blast-radius"

failure_patterns:
  state_consistency: []
  trust_boundary: []
  observability: []
  robustness: []
  live_path_wiring: []

subsystem_index:
  enabled: false
  path: null
