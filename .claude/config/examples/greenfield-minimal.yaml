# A minimal greenfield profile: a new Python project started from an empty
# repository, using the core schema profile (no data-engineering branch).

project:
  name: example-greenfield
  kind: application
  stack: [python]
  base_branch: main

artefact_tree:
  root: ai_docs/

product_locations:
  code_root: src/

validation:
  commands:
    - "uv run pytest -q"

review:
  severity_model: three-tier
  roster:
    - spec-conformance
    - correctness
    - failure-and-robustness
    - test-adequacy
    - conventions

failure_patterns: .claude/config/failure-patterns.yaml
schema_profile: core

agents:
  documentation-generator: enabled
  code-walkthrough: enabled
  feature-explorer: enabled
