project:
  name: example-python-aws-service
  description: A multi-service Python backend deployed on AWS ECS.
  kind: brownfield

artifact_root: ai_docs

task:
  id_scheme: "TASK-{NNN}"
  spec_grouping: by-concern

vcs:
  default_base_branch: master
  branch_scheme: "feature/{task-id-lower}-{slug}"

tech_stack:
  language: python
  package_manager: uv
  runtime_version: ">=3.14"
  frameworks:
    - fastapi
    - pydantic-v2
  linter: ruff
  type_checker: pyright

test_gate:
  commands:
    - "uv run pytest -q"
  conventions_doc: reference/testing-conventions.md
  test_naming: "test_{behaviour}"

deploy_config:
  detected: true
  config_files:
    - infrastructure/terraform/prod.tfvars
    - services/api/config.py
  infra_tool: terraform
  scaling_knobs:
    - desired_count
  feature_flags:
    - EVENT_BUS_TYPE

reference:
  context_doc: reference/CONTEXT.md
  adr_dir: reference/adr

review:
  mode: thorough
  roster:
    - spec-conformance
    - correctness
    - state-and-concurrency
    - security-and-trust-boundary
    - failure-and-robustness
    - observability
    - test-adequacy
    - interface-and-data-integrity
    - conventions
  consolidator: review-consolidator
  severity_model: "irreversibility x silence x blast-radius"

failure_patterns:
  state_consistency:
    - pattern: "read-modify-write on shared store without a lock or atomic op"
      breaks: "cross-replica race once more than one replica runs"
      cite: "services/api/repository.py:140"
      severity: high
  trust_boundary:
    - pattern: "request field used in a query without validation"
      breaks: "injection or unauthorised access"
      cite: "services/api/handlers.py:88"
      severity: high
  observability:
    - pattern: "new failure path with no log or span"
      breaks: "silent failure, undiagnosable in production"
      cite: ""
      severity: medium
  robustness:
    - pattern: "outbound call with no timeout or retry"
      breaks: "thread or task hang under partial failure"
      cite: ""
      severity: medium
  live_path_wiring:
    - pattern: "new behaviour wired only to a dark or flagged-off path"
      breaks: "ships disabled, gives false confidence"
      cite: ""
      severity: medium

subsystem_index:
  enabled: false
  path: null
